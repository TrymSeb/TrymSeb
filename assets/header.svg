<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="header-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7ee787;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#header-gradient)" />
  <!-- Constellation pattern -->
  <g opacity="0.15" stroke="#7ee787" stroke-width="1" fill="none">
    <line x1="50" y1="40" x2="120" y2="70" />
    <line x1="120" y1="70" x2="90" y2="120" />
    <line x1="90" y1="120" x2="150" y2="150" />
    <line x1="150" y1="150" x2="200" y2="100" />
    <line x1="200" y1="100" x2="280" y2="130" />
    <line x1="280" y1="130" x2="320" y2="60" />
    <line x1="320" y1="60" x2="380" y2="90" />
    <line x1="380" y1="90" x2="420" y2="140" />
    <line x1="420" y1="140" x2="480" y2="80" />
    <line x1="480" y1="80" x2="550" y2="110" />
    <line x1="550" y1="110" x2="620" y2="50" />
    <line x1="620" y1="50" x2="680" y2="120" />
    <line x1="680" y1="120" x2="750" y2="80" />
    <line x1="750" y1="80" x2="780" y2="150" />
  </g>
  <!-- Constellation dots -->
  <g fill="#7ee787" opacity="0.3">
    <circle cx="50" cy="40" r="2" />
    <circle cx="120" cy="70" r="2.5" />
    <circle cx="90" cy="120" r="2" />
    <circle cx="150" cy="150" r="3" />
    <circle cx="200" cy="100" r="2" />
    <circle cx="280" cy="130" r="2.5" />
    <circle cx="320" cy="60" r="2" />
    <circle cx="380" cy="90" r="3" />
    <circle cx="420" cy="140" r="2" />
    <circle cx="480" cy="80" r="2.5" />
    <circle cx="550" cy="110" r="2" />
    <circle cx="620" cy="50" r="3" />
    <circle cx="680" cy="120" r="2" />
    <circle cx="750" cy="80" r="2.5" />
    <circle cx="780" cy="150" r="2" />
  </g>
  <!-- Name -->
  <text x="400" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">TrymSeb</text>
  <!-- Tagline -->
  <text x="400" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="url(#accent-gradient)" text-anchor="middle" font-weight="400">building at the intersection of AI and infrastructure</text>
</svg>
